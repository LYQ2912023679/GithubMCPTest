<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #eee;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 600px;
        }
        #game-canvas {
            width: 600px;
            height: 600px;
            background: #16213e;
            border: 2px solid #0f3460;
            display: block;
        }
        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
        }
        #high-score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 5px;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            z-index: 20;
            font-size: 24px;
            text-align: center;
        }
        #overlay h1 { margin-bottom: 20px; color: #e94560; }
        #overlay p { margin-bottom: 10px; }
        #overlay .hint { font-size: 16px; color: #aaa; margin-top: 15px; }
        .hidden { display: none !important; }
        #status-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            z-index: 10;
            color: #e94560;
            background: rgba(0,0,0,0.5);
            padding: 3px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="600" height="600"></canvas>
        <div id="score-board">得分: <span id="current-score">0</span></div>
        <div id="high-score">最高分: <span id="best-score">0</span></div>
        <div id="status-indicator" class="hidden"></div>
        <div id="overlay">
            <h1>贪吃蛇游戏</h1>
            <p>按任意键开始</p>
            <p class="hint">方向键/WASD控制方向 | 空格暂停 | R重新开始 | ESC退出</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
